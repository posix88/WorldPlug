name: WorldPlug

# ── Options ──────────────────────────────────────────────────────────────────

options:
  bundleIdPrefix: com.posix88
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeVersion: "16.0"
  defaultConfig: Debug
  createIntermediateGroups: true
  groupSortPosition: top

# ── Build Configurations ──────────────────────────────────────────────────────

configs:
  Debug: debug
  Release: release

# ── Shared Build Settings ─────────────────────────────────────────────────────

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_TESTABILITY: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

# ── Local Swift Packages ──────────────────────────────────────────────────────

packages:
  Repository:
    path: Repository

# ── Targets ───────────────────────────────────────────────────────────────────

targets:

  # ── App ─────────────────────────────────────────────────────────────────────
  WorldPlug:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: WorldPlug/Sources
      - path: WorldPlug/Resources/Assets.xcassets
      - path: WorldPlug/Resources/LaunchScreen.storyboard
      - path: WorldPlug/Resources/Copies
      - path: WorldPlug/Resources/Preview Content
        buildPhase: resources

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.posix88.WorldPlug
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: WorldPlug/WorldPlug-Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_ASSET_PATHS: '"WorldPlug/Resources/Preview Content"'

    dependencies:
      - package: Repository

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  WorldPlugTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: WorldPlugTests

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.posix88.WorldPlugTests

    dependencies:
      - target: WorldPlug
      - package: Repository

# ── Schemes ───────────────────────────────────────────────────────────────────

schemes:
  WorldPlug:
    build:
      targets:
        WorldPlug: all
        WorldPlugTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: WorldPlugTests
          parallelizable: true
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
